name: backend-quality

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"
      - ".github/actions/backend-quality/**"
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/backend-quality.yml"
      - ".github/actions/backend-quality/**"

jobs:
  backend-quality-sqlite:
    name: backend-quality (SQLite)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./ci.sqlite
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/backend-quality

  backend-quality-postgres:
    name: backend-quality (PostgreSQL)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/ci
      TEST_DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/ci
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/backend-quality
